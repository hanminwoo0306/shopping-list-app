<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .stats span {
      font-size: 0.85rem;
      color: #666;
    }

    .clear-btn {
      font-size: 0.8rem;
      color: #e53e3e;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid #f0f0f0;
      animation: slideIn 0.2s ease;
    }

    li:last-child {
      border-bottom: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #1a1a2e;
      transition: color 0.2s;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.95rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle" id="subtitle">0개 중 0개 완료</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()" title="추가">+</button>
    </div>

    <div class="stats">
      <span id="statsText"></span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="emptyMsg">아이템을 추가해 보세요!</p>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    const input = document.getElementById('itemInput');
    const list  = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const subtitle = document.getElementById('subtitle');
    const statsText = document.getElementById('statsText');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';
      const total   = items.length;
      const checked = items.filter(i => i.done).length;

      subtitle.textContent = `${total}개 중 ${checked}개 완료`;
      statsText.textContent = total ? `총 ${total}개` : '';
      emptyMsg.style.display = total ? 'none' : 'block';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.addEventListener('change', () => toggle(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.addEventListener('click', () => remove(idx));

        li.append(cb, span, del);
        list.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
